# ==============================================================================
# File: render.yaml
# Purpose: Render Blueprint specification for the Crypto Trading Bot deployment.
# Fits into: Infrastructure configuration for the deployment phase.
# ==============================================================================

services:
  - type: web
    name: crypto-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET
        sync: false
      - key: FIREBASE_CREDENTIALS
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
